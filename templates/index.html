<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>Student Performance Predictor</h1>

    <form action="/predict" method="post">
        <input type="number" name="study_hours" placeholder="Study Hours" required>
        <input type="number" name="attendance" placeholder="Attendance %" required>
        <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction_text }}</h2>

    <h3>Attendance Status: {{ attendance_status }}</h3>
    <h3>Absent: {{ absent }}%</h3>
    <h3>Study Feedback: {{ study_msg }}</h3>

</div>

</body>
</html>
