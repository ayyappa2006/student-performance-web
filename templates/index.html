<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>Student Performance Predictor</h1>

    <form action="/predict" method="post">
        <input type="number" name="study_hours" placeholder="Study Hours" required>
        <input type="number" name="attendance" placeholder="Attendance %" required>
        <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction_text }}</h2>

    <canvas id="chart"></canvas>
</div>

<script>
    const value = "{{ prediction_text }}";

    if(value){
        const score = parseFloat(value.split(": ")[1]);

        new Chart(document.getElementById("chart"), {
            type: 'bar',
            data: {
                labels: ['Score'],
                datasets: [{
                    label: 'Prediction',
                    data: [score],
                    backgroundColor: '#4facfe'
                }]
            }
        });
    }
</script>

</body>
</html>
