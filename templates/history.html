<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">
<h1>History</h1>

<table border="1">
<tr>
<th>University</th>
<th>Hours</th>
<th>Attendance</th>
<th>Score</th>
<th>Status</th>
</tr>

{% for row in records %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
