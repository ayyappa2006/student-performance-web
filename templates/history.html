<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Student History 📁</h1>

<table border="1">
<tr>
<th>Email</th>
<th>University</th>
<th>Hours</th>
<th>Attendance</th>
<th>Score</th>
<th>Status</th>
</tr>

{% for row in records %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
